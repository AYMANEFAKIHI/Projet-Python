{% extends "base/base.html" %}
{% block title %}Confirmer la suppression — GestionFrais{% endblock %}
{% block content %}
<div style="display:flex;justify-content:center;padding-top:40px;">
  <div class="danger-card">
    <div style="font-size:40px;margin-bottom:16px;">⚠️</div>
    <h2 style="font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:8px;color:var(--text-primary);">Confirmer la suppression</h2>
    <p style="font-size:13.5px;color:var(--text-secondary);margin-bottom:6px;">Êtes-vous sûr de vouloir supprimer ce {{ type }} ?</p>
    <p style="font-size:13.5px;font-weight:600;color:var(--text-primary);margin-bottom:4px;">{{ obj }}</p>
    <p style="font-size:12px;color:var(--danger);margin-bottom:24px;">Cette action est irréversible.</p>
    <div style="display:flex;gap:10px;justify-content:center;">
      <form method="post">{% csrf_token %}
        <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Supprimer</button>
      </form>
      <a href="javascript:history.back()" class="btn btn-outline">Annuler</a>
    </div>
  </div>
</div>
{% endblock %}
